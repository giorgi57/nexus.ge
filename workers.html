<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ხელოსნები - Nexus.ge</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="location.href='index.html'">NEXUS<span>.GE</span></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">მთავარი</a></li>
                <li><a href="workers.html">ხელოსნები</a></li>
                <li><a href="add-post.html" class="add-btn">დამატება</a></li>
            </ul>
        </nav>
        <div class="header-controls">
            <button id="themeToggle">🌙</button>
        </div>
    </header>

    <main class="main-layout">
        <aside class="ad-sidebar">
            <div class="ad-square">რეკლამა 1</div>
            <div class="ad-square">რეკლამა 2</div>
        </aside>
        <section class="content-center">
            <div class="workers-header">
                <h2 id="pageTitle">ხელოსნების სია</h2>
                <div class="filter-bar">
                    <div class="search-wrap">
                        <span>🔍</span>
                        <input type="text" id="workerSearch" placeholder="ძებნა სახელით...">
                    </div>
                    <select id="cityFilter">
                        <option value="">ყველა ქალაქი</option>
                        <option>თბილისი</option>
                        <option>ბათუმი</option>
                        <option>ქუთაისი</option>
                        <option>რუსთავი</option>
                        <option>გორი</option>
                        <option>ზუგდიდი</option>
                        <option>ფოთი</option>
                        <option>ხაშური</option>
                        <option>სამტრედია</option>
                        <option>სენაკი</option>
                        <option>ახალციხე</option>
                        <option>ახალქალაქი</option>
                        <option>ამბროლაური</option>
                        <option>ბოლნისი</option>
                        <option>გარდაბანი</option>
                        <option>გურჯაანი</option>
                        <option>დედოფლისწყარო</option>
                        <option>დმანისი</option>
                        <option>დუშეთი</option>
                        <option>ვანი</option>
                        <option>თეთრიწყარო</option>
                        <option>თელავი</option>
                        <option>თერჯოლა</option>
                        <option>კასპი</option>
                        <option>კვარელი</option>
                        <option>ლაგოდეხი</option>
                        <option>ლანჩხუთი</option>
                        <option>მარნეული</option>
                        <option>მარტვილი</option>
                        <option>მესტია</option>
                        <option>მცხეთა</option>
                        <option>ნინოწმინდა</option>
                        <option>ოზურგეთი</option>
                        <option>ონი</option>
                        <option>საგარეჯო</option>
                        <option>საჩხერე</option>
                        <option>სიღნაღი</option>
                        <option>ტყიბული</option>
                        <option>წალენჯიხა</option>
                        <option>წალკა</option>
                        <option>წყალტუბო</option>
                        <option>ჩოხატაური</option>
                        <option>ხარაგაული</option>
                        <option>ხელვაჩაური</option>
                        <option>ხობი</option>
                        <option>ხონი</option>
                        <option>ხულო</option>
                        <option>ჯვარი</option>
                    </select>
                    <select id="catFilter">
                        <option value="">ყველა კატეგორია</option>
                        <option value="სრული რემონტი">🏠 სრული რემონტი</option>
                        <option value="ელექტროობა">⚡ ელექტროობა</option>
                        <option value="სანტექნიკა">🚿 სანტექნიკა</option>
                        <option value="გიფსოკარდონი">🧱 გიფსოკარდონი</option>
                        <option value="კაფელი">📐 კაფელი</option>
                        <option value="გათბობა">🌡️ გათბობა</option>
                        <option value="მხატვრობა">🎨 მხატვრობა</option>
                        <option value="კარ-ფანჯარა">🪟 კარ-ფანჯარა</option>
                        <option value="ავეჯი">🪑 ავეჯი</option>
                        <option value="სახურავი">🏗️ სახურავი</option>
                    </select>
                </div>
            </div>
            <div class="worker-list" id="workerGrid">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
            <p id="noResults" style="display:none; text-align:center; color:#94a3b8; margin-top:60px; font-size:16px;">😕 ხელოსანი ვერ მოიძებნა</p>
        </section>
        <aside class="ad-sidebar">
            <div class="ad-square">რეკლამა 3</div>
            <div class="ad-square">რეკლამა 4</div>
        </aside>
    </main>

    <!-- Modal -->
    <div id="workerModal" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
        <div class="modal-box">
            <button class="modal-close" onclick="document.getElementById('workerModal').style.display='none'">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script type="module" src="js/workers.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
