<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus.ge - მთავარი</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="location.href='index.html'">NEXUS<span>.GE</span></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html" id="navHome">მთავარი</a></li>
                <li><a href="workers.html" id="navWorkers">ხელოსნები</a></li>
                <li><a href="add-post.html" class="add-btn" id="navAdd">დამატება</a></li>
            </ul>
        </nav>
        <div class="header-controls">
            <select id="langSwitch">
                <option value="ka">GEO</option>
                <option value="en">ENG</option>
                <option value="ru">RUS</option>
            </select>
            <button id="themeToggle">🌙</button>
        </div>
    </header>

    <main class="main-layout">
        <aside class="ad-sidebar side-left">
            <div class="ad-square">რეკლამა 1</div>
            <div class="ad-square">რეკლამა 2</div>
        </aside>
        <section class="content-center">
            <div class="hero-section">
                <h1 id="heroTitle">იპოვნე ხელოსანი <span>Nexus</span>-ზე</h1>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="რა მომსახურება გჭირდებათ?">
                    <button id="searchBtn">ძებნა</button>
                </div>
            </div>
            <div class="grid-container">
                <div class="card featured" onclick="location.href='workers.html?cat=სრული რემონტი'">🏠 სრული რემონტი</div>
                <div class="card" onclick="location.href='workers.html?cat=ელექტროობა'">⚡ ელექტროობა</div>
                <div class="card" onclick="location.href='workers.html?cat=სანტექნიკა'">🚿 სანტექნიკა</div>
                <div class="card" onclick="location.href='workers.html?cat=გიფსოკარდონი'">🧱 გიფსოკარდონი</div>
                <div class="card" onclick="location.href='workers.html?cat=კაფელი'">📐 კაფელი</div>
                <div class="card" onclick="location.href='workers.html?cat=გათბობა'">🌡️ გათბობა</div>
            </div>
        </section>
        <aside class="ad-sidebar side-right">
            <div class="ad-square">რეკლამა 3</div>
            <div class="ad-square">რეკლამა 4</div>
        </aside>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
