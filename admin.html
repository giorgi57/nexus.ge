<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ადმინ პანელი - Nexus.ge</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <div class="logo" style="font-size:28px;font-weight:800;margin-bottom:8px;">
                NEXUS<span style="color:#10b981;">.GE</span>
            </div>
            <h2>ადმინ პანელი</h2>
            <p>შედით თქვენი ანგარიშით</p>
            <div id="loginError" class="error-msg" style="display:none;"></div>
            <input type="email"    id="adminEmail"    placeholder="ემაილი..." autocomplete="email">
            <input type="password" id="adminPassword" placeholder="პაროლი..." autocomplete="current-password">
            <button class="add-btn" id="loginBtn" style="width:100%;padding:12px;font-size:15px;">შესვლა</button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" style="display:none;">
        <header class="navbar">
            <div class="logo" onclick="location.href='index.html'">NEXUS<span>.GE</span></div>
            <div style="font-weight:600;color:#10b981;">⚙️ ადმინ პანელი</div>
            <div class="header-controls">
                <button id="themeToggle">🌙</button>
                <button class="logout-btn" id="logoutBtn">გამოსვლა</button>
            </div>
        </header>

        <div class="admin-layout">
            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-num" id="statPending">0</div>
                    <div class="stat-label">მოლოდინში</div>
                </div>
                <div class="stat-card approved">
                    <div class="stat-num" id="statApproved">0</div>
                    <div class="stat-label">დამტკიცებული</div>
                </div>
                <div class="stat-card rejected">
                    <div class="stat-num" id="statRejected">0</div>
                    <div class="stat-label">უარყოფილი</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="pending">⏳ მოლოდინში <span class="badge" id="badgePending">0</span></button>
                <button class="tab-btn" data-tab="approved">✅ დამტკიცებული</button>
                <button class="tab-btn" data-tab="rejected">❌ უარყოფილი</button>
                <button class="tab-btn" data-tab="ads">📢 რეკლამები</button>
            </div>

            <!-- Content -->
            <div class="admin-content">
                <div id="tab-pending"  class="tab-panel active"><div class="posts-grid" id="pendingGrid"><p class="loading-text">⏳ იტვირთება...</p></div></div>
                <div id="tab-approved" class="tab-panel"><div class="posts-grid" id="approvedGrid"><p class="loading-text">⏳ იტვირთება...</p></div></div>
                <div id="tab-rejected" class="tab-panel"><div class="posts-grid" id="rejectedGrid"><p class="loading-text">⏳ იტვირთება...</p></div></div>

                <!-- რეკლამების tab -->
                <div id="tab-ads" class="tab-panel">
                    <div class="ad-upload-box">
                        <h3>📢 ახალი რეკლამის დამატება</h3>

                        <div class="ad-form-row">
                            <div class="ad-photo-drop" id="adPhotoArea">
                                <img id="adPreview" src="" style="display:none; width:100%; border-radius:10px;">
                                <div id="adPlaceholder">
                                    <div style="font-size:32px;">🖼️</div>
                                    <p>ბანერის სურათი</p>
                                    <small>JPG, PNG — მაქს. 1.5MB</small>
                                </div>
                                <input type="file" id="adPhoto" accept="image/*" style="display:none;">
                            </div>
                            <div class="ad-fields">
                                <label>დამკვეთის სახელი</label>
                                <input type="text" id="adName" placeholder="მაგ: ABC კომპანია">
                                <label>ლინკი (URL)</label>
                                <input type="url" id="adLink" placeholder="https://...">
                                <label>პოზიცია</label>
                                <select id="adPosition">
                                    <option value="sidebar">გვერდი (sidebar)</option>
                                    <option value="mobile">მობილური (ხელოსნებს შორის)</option>
                                    <option value="both">ორივე</option>
                                </select>
                                <button class="add-btn" id="adSubmitBtn" style="width:100%; margin-top:8px;">
                                    <span id="adSubmitText">✚ დამატება</span>
                                    <span id="adSubmitLoad" style="display:none;">⏳...</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <h3 style="margin-bottom:16px; font-size:16px;">არსებული რეკლამები</h3>
                    <div class="ads-grid" id="adsGrid">
                        <p class="loading-text">⏳ იტვირთება...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/admin.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
